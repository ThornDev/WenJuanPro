top_issues:
  - id: QA-2.3-M1
    severity: medium
    category: task_hygiene
    finding: |
      42 of 42 Tasks/Subtasks checkboxes remain "[ ]" despite implementation being complete
      (attested by Change Log, Dev Agent Record, Binding Status, and Dev Log). This is a
      hygiene/traceability gap, not a deliverable gap — every declared file exists and every
      test scenario is mapped.
    recommendation: |
      On the next pass (or during Story 2.4 draft), tick the boxes to match reality. Non-blocking
      for gate PASS.
    suggested_owner: dev
  - id: QA-2.3-L1
    severity: low
    category: path_deviation
    finding: |
      Story spec places DeviceIdProvider at `data/device/DeviceIdProvider.kt`; implementation
      landed at `core/device/DeviceIdProvider.kt`. Binding `verify: "DeviceIdProvider"` still
      matches; StartSessionUseCase imports from `core.device` without issue.
    recommendation: |
      Accept as-is (`core/device` is a valid location for cross-cutting platform wrappers) and
      annotate File Locations in a future story pass. Non-blocking.
    suggested_owner: dev

