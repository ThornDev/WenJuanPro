top_issues:
  - id: QA-2.1-INFO-001
    severity: low
    finding: >
      Build verification (./gradlew :app:testDebugUnitTest /
      connectedDebugAndroidTest / ktlintCheck / lintDebug) executed 0 times
      in sandbox — no JDK/Gradle/Android SDK available. Follows Story
      1.1/1.2/1.3/1.4 Deferred-as-Pass precedent, but QA cannot independently
      confirm pass-rate of the 36 executable cases + resource compilation.
    suggested_action: >
      Before Epic 2 smoke test, run all four Gradle tasks in Android Studio
      (API 31+ emulator for connectedDebugAndroidTest) and paste results
      into `docs/qa/evidence/2.1/build-verification.log`. Epic 2 smoke test
      is the integration gate that re-runs the full suite post-commit.
  - id: QA-2.1-INFO-002
    severity: low
    finding: >
      Five E2E Compose scenarios (E2E-003 navigate-to-welcome; E2E-004 full
      flow config→scan→welcome; E2E-005 empty configId popBackStack; E2E-008
      resume-after-settings; E2E-009 activity-recreate dispose) are
      `@Ignore`d because the repo lacks a FakeQrSource Hilt test binding + a
      HiltAndroidTest harness that can push a decoded QR payload through
      the real CameraX/ZXing pipeline. Deterministic business-logic
      equivalents exist at the VM layer (UNIT-013/014/017/018/009/012 +
      UNIT-027) and the @Ignore annotations embed explicit traceability
      comments, so coverage is evidence-driven rather than behaviorally
      observed.
    suggested_action: >
      Track via the "FakeQrSource Hilt test binding" Open Issue on Story
      2.1. Suggested scope for the follow-up: a `FakeQrSource` with
      `suspend fun emit(content: String)`, an `@InstallIn(SingletonComponent::class)`
      test module replacing `QrDecoder.default()`, and a `HiltAndroidTest`-
      decorated `MainActivity` rule seeded with a sample config under
      `/sdcard/WenJuanPro/configs/`.
  - id: QA-2.1-INFO-003
    severity: low
    finding: >
      Story AC1 UI Interaction row specifies the invalid-studentId
      Snackbar shows for "2 秒（`SnackbarDuration.Short`）" — internally
      inconsistent: Material 3's `SnackbarDuration.Short` is ~4000ms by
      platform default, not 2000ms. Implementation follows the parenthetical
      API hint (`SnackbarDuration.Short`) rather than the "2 秒" numeric,
      which is the standard Compose idiom.
    suggested_action: >
      Non-blocking. If the research protocol truly requires a strict 2s
      cadence, swap the `snackbarHostState.showSnackbar` call for a
      `kotlinx.coroutines.delay(2_000)`-timed reduce that clears
      `transientSnackbar`. Otherwise update the story AC text to drop the
      "2 秒" literal and retain only `SnackbarDuration.Short`. Neither
      option needs to block Story 2.1.
  - id: QA-2.1-INFO-004
    severity: low
    finding: >
      Real-device metrics for CameraX bind latency, ZXing decode median/p95,
      and HapticFeedback perceived duration (front-end-spec §性能考量 and
      §动效 line 1098) are noted as Deferred in Dev Log §Deferred per
      `project_build_deferred`. The ≤ 500ms scan-to-jump SLA and ≤ 3s full
      扫码→欢迎 SLA cannot be verified statically.
    suggested_action: >
      Capture research-device (or Android 12/14 emulator) samples during
      the Epic 2 smoke test pass and record medians/p95 in
      `docs/dev/logs/2.1-dev-log.md` under a new §Device Metrics section.

