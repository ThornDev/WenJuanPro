      Before Epic 1 smoke test, run `./gradlew test ktlintCheck assembleDebug` in Android Studio
      and paste the results into `docs/qa/evidence/1.3/build-verification.log`.
  - id: QA-1.3-INFO-002
    severity: low
    finding: >
      `parseOptions` returns a flat `List<OptionContent>` with at most one `Image` or `Text` per
      option (no `OptionContent.Mixed` produced). Story T3 line 222 explicitly allows either flat
      list OR Mixed nesting, so this is in-spec; flagged only because the sealed `OptionContent.Mixed`
      branch is currently unreachable from the parser.
    suggested_action: >
      Either document the convention in a parser comment or delete `OptionContent.Mixed` if
      consumers (Story 1.4+) confirm they will never need a single option to contain both image
      and text. Defer to PO/Architect.

